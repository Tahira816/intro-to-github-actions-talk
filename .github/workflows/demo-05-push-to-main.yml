- name: Test
  run: |
    dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" \
      --no-restore \
      --verbosity normal \
      --logger "trx" \
      --results-directory "TestResults"

- name: Debug - List TestResults
  if: success() || failure()
  run: |
    echo "=== Searching for .trx files ==="
    find /home/runner/work -name "*.trx" 2>/dev/null
    echo "=== Contents of TestResults dir ==="
    ls -la TestResults/ 2>/dev/null || echo "TestResults dir not found"

- name: Test Report
  uses: dorny/test-reporter@v1
  if: success() || failure()
  with:
    name: XUnit Tests
    path: "TestResults/*.trx"
    reporter: dotnet-trx
