name: Demo 05 - Push To Main

on:
  workflow_dispatch:
  push:
    branches: 
      - main
  
jobs:
  build-app:
    name: "Build App"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore
      run: dotnet restore "${{ github.workspace }}/mywebapp/mywebapp.sln"
    
    - name: Build
      run: dotnet build "${{ github.workspace }}/mywebapp/mywebapp.sln" --configuration Release --no-restore
    
    - name: Test
      run: dotnet test "${{ github.workspace }}/mywebapp/mywebapp.sln" --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: XUnit Tests
        path: ${{ github.workspace }}/mywebapp/tests/TestResults/*.trx
        reporter: dotnet-trx
      
    # ❌ REMOVED dotnet publish (important)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mywebappbuildartifacts
        path: ${{ github.workspace }}/mywebapp
        if-no-files-found: error
        retention-days: 30


  deploy-DEV:
    name: "Deploy To Azure DEV env"
    runs-on: ubuntu-latest
    needs: build-app

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Login via Azure CLI
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: mywebappbuildartifacts
        path: mywebappbuildartifacts
   
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v2
      with: 
        app-name: mywebapp-actions
        package: mywebappbuildartifacts
        slot-name: dev
